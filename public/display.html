<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  margin:0;
  width:1080px;
  height:1920px;
  background:#0f1f1a;
  font-family:sans-serif;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(5,1fr);
  gap:20px;
  padding:25px;
}

.card{
  background:#163326;
  border-radius:20px;
  padding:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:12px;
}

.price{
  color:#00ffcc;
  font-size:18px;
  animation:pulse 3s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>
<div id="menu" class="grid"></div>

<script>
const ws = new WebSocket(location.origin.replace("http","ws"));

ws.onmessage = e=>{
  const data = JSON.parse(e.data);
  const items = data.sort(()=>0.5-Math.random()).slice(0,10);

  document.getElementById("menu").innerHTML =
    items.map(i=>`
      <div class="card">
        <img src="${i.image}">
        <h3>${i.title}</h3>
        <p>${i.text}</p>
        <div class="price">${i.price}</div>
      </div>
    `).join("");
};
</script>
</body>
</html>
