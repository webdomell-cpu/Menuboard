<!-- ================= public/display.html ================= --><!DOCTYPE html><html>
<head>
<style>
body{margin:0;width:1080px;height:1920px;overflow:hidden;}
.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(5,1fr);gap:20px;padding:20px;}
.card{position:relative;border-radius:20px;padding:10px;}
.card img{width:100%;height:150px;object-fit:cover;border-radius:10px;}
.sticker{position:absolute;bottom:10px;right:10px;padding:15px;color:#000;font-weight:bold;animation:pulse 2s infinite;}
.circle{border-radius:50%;}
.star{clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);} @keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}} </style>

</head>
<body>
<div id="menu" class="grid"></div><script>
const ws=new WebSocket(location.origin.replace("http","ws"));

ws.onmessage=e=>{
  const {menuData,settings}=JSON.parse(e.data);

  document.body.style.background = settings.backgroundType==="color"
    ? settings.backgroundColor
    : `url(${settings.backgroundImage}) center/cover`;

  document.getElementById("menu").innerHTML = menuData.slice(0,10).map(i=>{
    const sticker = i.sticker
      ? `<div class="sticker ${i.stickerType}" style="background:${i.stickerColor}">${i.price}</div>`
      : `<div>${i.price}</div>`;

    return `
      <div class="card" style="background:${settings.cardColor};color:${settings.textColor}">
        <img src="${i.image}">
        <h3>${i.title}</h3>
        <p>${i.text}</p>
        ${sticker}
      </div>
    `;
  }).join("");
};
</script></body>
