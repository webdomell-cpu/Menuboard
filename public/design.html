</html><!-- ================= public/design.html ================= --><!DOCTYPE html><html>
<body>
<h2>Design Einstellungen</h2><label>Hintergrundfarbe</label> <input type="color" onchange="settings.backgroundColor=this.value"><br>

<label>Hintergrundbild URL</label> <input onchange="settings.backgroundImage=this.value"><br>

<label>Kartenfarbe</label> <input type="color" onchange="settings.cardColor=this.value"><br>

<label>Textfarbe</label> <input type="color" onchange="settings.textColor=this.value"><br>

<button onclick="save()">Speichern</button>

<script>
let data,settings;
fetch('/api/menu').then(r=>r.json()).then(d=>{data=d.menuData;settings=d.settings;});

function save(){
  fetch('/api/menu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({menuData:data,settings})});
}
</script></body>
</html>
