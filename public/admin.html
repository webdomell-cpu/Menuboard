<!DOCTYPE html>
<html>
<body>

<h2>Menü bearbeiten</h2>
<div id="editor"></div>
<button onclick="save()">Speichern</button>

<script>
let data=[];

fetch("/api/menu")
.then(r=>r.json())
.then(d=>{data=d;render();});

function render(){
  const el=document.getElementById("editor");
  el.innerHTML="";

  data.forEach((item,i)=>{
    el.innerHTML+=`
      <div style="margin:10px;padding:10px;border:1px solid #ccc;">
        <input value="${item.title}" onchange="update(${i},'title',this.value)" placeholder="Titel (max 60 Zeichen)"><br>
        <textarea onchange="update(${i},'text',this.value)" placeholder="Beschreibung (max 180 Zeichen)">${item.text}</textarea><br>
        <input value="${item.price}" onchange="update(${i},'price',this.value)"><br>

        <input type="file" onchange="upload(event,${i})"><br>
        <img src="${item.image}" width="100">
      </div>
    `;
  });
}

function update(i,f,v){data[i][f]=v;}

function upload(e,i){
  const reader=new FileReader();
  reader.onload=ev=>{
    data[i].image=ev.target.result;
    render();
  };
  reader.readAsDataURL(e.target.files[0]);
}

function save(){
  fetch("/api/menu",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}
</script>

</body>
</html>
